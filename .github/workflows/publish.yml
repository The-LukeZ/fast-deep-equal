name: Publish to npm

on:
    push:
        tags:
            - "v*"

permissions:
    contents: read
    id-token: write

jobs:
    publish:
        runs-on: ubuntu-latest
        environment: npm
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0 # needed for changeset publish to find tags

            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: "pnpm"
                  registry-url: "https://registry.npmjs.org"

            - run: pnpm install --frozen-lockfile

            - run: pnpm ci:publish
              env:
                  NPM_CONFIG_PROVENANCE: true
