name: Publish to npm

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:

permissions:
    contents: read
    id-token: write

jobs:
    publish:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0 # needed for changeset publish to find tags

            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  registry-url: "https://registry.npmjs.org"

            - run: pnpm install --no-frozen-lockfile

            - run: pnpm ci:publish
